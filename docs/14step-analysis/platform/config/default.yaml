# 14步深度投资研究平台 - 默认配置

# 执行模式: full / quick
mode: full

# 分析师名称
analyst_name: "江安澜"

# 数据层配置
data:
  cache_dir: "~/.cache/investment-research"
  akshare_enabled: true
  akshare_timeout: 30
  sina_fallback: true
  pdf_storage_dir: "~/reports/pdfs"
  max_retry: 3
  data_validation_strict: true

# 分析层配置
analysis:
  min_word_count:
    step_1: 800
    step_2: 1200
    step_3: 800
    step_4: 2000
    step_5: 1200
    step_6: 800
    step_6_5: 600
    step_7: 800
    step_8: 800
    step_9: 800
    step_10: 800
    step_11: 400
    step_12: 1500
    step_13: 1200
    step_14: 400
    step_15: 500
    step_16: 300
  signal_density_min: 2
  anomaly_threshold: 0.3  # 30% 同比变化阈值

# 估值层配置
valuation:
  # 全球基准 WACC，A 股实际使用时需加入中国 CRP（约 0.95%）
  # 即 A 股默认 ERP = 美国 ERP (4.20%) + 中国 CRP (0.95%) = 5.15%
  # 此处 8.5% 仅为参考起点，具体值需按 Damodaran 最新数据计算
  default_wacc: 0.085
  default_g_terminal: 0.022
  default_tax: 0.25
  default_sales_to_capital: 1.5
  default_years: 10
  terminal_value_max_pct: 0.80  # 终值占比上限
  sensitivity_wacc_bps: 100  # WACC 敏感性 ±bps
  sensitivity_g_bps: 50  # g 敏感性 ±bps
  monte_carlo_iterations: 10000

# 质量层配置
quality:
  pass_rate_threshold: 75.0
  hard_fail_items:
    - "g ≤ Rf"
    - "g = ROIC × RR 一致性"
    - "13.0 反向论文 3 个 kill points"
    - "12.-1 公司类型分类"
    - "12.8 市场预期诊断"
    - "12.10 估值汇总表"
    - "12 个月复盘备忘"
  pdf_verify_threshold: 0.08  # 8% 偏差阈值
  pdf_warn_threshold: 0.03   # 3% 偏差警告

# 输出层配置
output:
  output_dir: "~/reports"
  report_format: "markdown"
  include_charts: true
  chart_style: "professional"
  auto_open: false
